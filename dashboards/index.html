<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Дом</title>
<style>
:root{
  --bg:#0f1115; --card:#181b21; --card2:#1e222a; --line:#282d37;
  --tx:#e8eaed; --dim:#8b919c; --acc:#5b9dd9;
  --ok:#4a9d5f; --warn:#c9a227; --off:#4a4f5a; --bad:#c05050;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);
  font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
.wrap{max-width:1000px;margin:0 auto;padding:24px 16px 48px}
header{display:flex;align-items:baseline;justify-content:space-between;
  margin-bottom:24px;flex-wrap:wrap;gap:8px}
h1{font-size:1.5rem;font-weight:600;margin:0;letter-spacing:-.01em}
.upd{font-size:.8rem;color:var(--dim)}
.grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
.sec{margin-bottom:28px}
.sec h2{font-size:.78rem;text-transform:uppercase;letter-spacing:.08em;
  color:var(--dim);font-weight:600;margin:0 0 10px;padding-left:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:14px 16px;display:flex;flex-direction:column;gap:6px}
.card .nm{font-size:.88rem;color:var(--dim);line-height:1.35}
.card .vl{font-size:1.35rem;font-weight:600;letter-spacing:-.02em}
.card.wide{grid-column:1/-1}
.st{display:inline-flex;align-items:center;gap:7px;font-size:1.05rem;font-weight:500}
.dot{width:9px;height:9px;border-radius:50%;flex:none}
.d-ok{background:var(--ok)} .d-off{background:var(--off)}
.d-warn{background:var(--warn)} .d-bad{background:var(--bad)}
.muted{color:var(--dim)}
.row{display:flex;justify-content:space-between;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:none}
.row .l{font-size:.9rem}
.row .r{font-size:.9rem;color:var(--dim)}
nav{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap}
nav a{flex:1;min-width:150px;padding:13px 16px;background:var(--card);
  border:1px solid var(--line);border-radius:10px;color:var(--tx);
  text-decoration:none;font-size:.92rem;transition:background .15s}
nav a:hover{background:var(--card2)}
nav a small{display:block;color:var(--dim);font-size:.78rem;margin-top:2px}
.err{background:#2a1d1d;border-color:#4a2c2c;color:#e0a0a0;
  padding:12px 16px;border-radius:10px;font-size:.88rem}
footer{margin-top:32px;color:var(--dim);font-size:.78rem;text-align:center}
.chart{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:14px 16px 8px;margin-bottom:12px}
.chart h3{margin:0 0 2px;font-size:.9rem;font-weight:600}
.chart .sub{color:var(--dim);font-size:.78rem;margin-bottom:10px}
.chart svg{display:block;width:100%;height:120px;overflow:visible}
.chart .gl{stroke:var(--line);stroke-width:1}
.chart .lb{fill:var(--dim);font-size:10px}
.chart .empty{color:var(--dim);font-size:.85rem;padding:14px 0}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Дом</h1>
    <span class="upd" id="upd">загрузка…</span>
  </header>
  <div id="content"><p class="muted">Читаю состояние дома…</p></div>
  <div id="charts"></div>
  <nav>
    <a href="https://192.168.55.120:8443/">Home Assistant<small>управление устройствами</small></a>
    <a href="/grafana/">Grafana<small>графики и история</small></a>
  </nav>
  <footer>Обновляется каждые 30 секунд</footer>
</div>
<script>
const OFF = ["unavailable","unknown"];

function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}

function fmtName(n){
  return n.replace(/ Socket 1$/,"").replace(/ Switch 1$/,"")
          .replace(/ Door 1$/,"").replace(/ Мощность$/,"")
          .replace(/ Дым$/,"").replace(/ Подсветка$/," (подсветка)")
          .trim();
}

function card(name, inner){
  return `<div class="card"><div class="nm">${esc(fmtName(name))}</div>${inner}</div>`;
}

function stateLine(cls, text){
  return `<div class="st"><span class="dot ${cls}"></span>${esc(text)}</div>`;
}

function render(states){
  const by = {};
  states.forEach(s => by[s.entity_id] = s);
  const get = id => by[id];
  let html = "";

  // ── Безопасность ──
  const smoke = get("binary_sensor.smoke_alarm_smoke");
  const covers = states.filter(s => s.entity_id.startsWith("cover."));
  let sec = "";
  if (smoke){
    const off = OFF.includes(smoke.state);
    sec += card("Датчик дыма", off
      ? stateLine("d-warn","нет связи")
      : stateLine(smoke.state === "on" ? "d-bad" : "d-ok",
                  smoke.state === "on" ? "ТРЕВОГА" : "норма"));
  }
  covers.forEach(c => {
    const off = OFF.includes(c.state);
    const open = c.state === "open";
    sec += card(c.attributes.friendly_name || c.entity_id, off
      ? stateLine("d-off","нет связи")
      : stateLine(open ? "d-warn" : "d-ok", open ? "открыто" : "закрыто"));
  });
  if (sec) html += `<div class="sec"><h2>Безопасность</h2><div class="grid">${sec}</div></div>`;

  // ── Свет ──
  const lights = states.filter(s =>
    s.entity_id.startsWith("light.") ||
    (s.entity_id.startsWith("switch.") && /svet|light/i.test(s.entity_id)));
  let lg = "";
  lights.forEach(l => {
    const off = OFF.includes(l.state);
    lg += card(l.attributes.friendly_name || l.entity_id, off
      ? stateLine("d-off","нет связи")
      : stateLine(l.state === "on" ? "d-ok" : "d-off", l.state === "on" ? "включён" : "выключен"));
  });
  if (lg) html += `<div class="sec"><h2>Свет</h2><div class="grid">${lg}</div></div>`;

  // ── Розетки и потребление ──
  const plugs = states.filter(s =>
    s.entity_id.startsWith("switch.") &&
    s.entity_id.endsWith("_socket_1"));
  let rows = "", total = 0, haveTotal = false;
  plugs.forEach(p => {
    const base = p.entity_id.replace(/^switch\./,"").replace(/_socket_1$/,"");
    const pw = get(`sensor.${base}_power`);
    const offline = OFF.includes(p.state);
    let right;
    if (offline){ right = "нет связи"; }
    else if (pw && !OFF.includes(pw.state)){
      const w = parseFloat(pw.state);
      if (!isNaN(w)){ total += w; haveTotal = true; }
      right = p.state === "on" ? `включена · ${pw.state} Вт` : "выключена";
    } else {
      right = p.state === "on" ? "включена" : "выключена";
    }
    rows += `<div class="row"><span class="l">${esc(fmtName(p.attributes.friendly_name || base))}</span><span class="r">${esc(right)}</span></div>`;
  });
  if (rows){
    let head = "";
    if (haveTotal) head = card("Сейчас потребляют", `<div class="vl">${total.toFixed(1)} Вт</div>`);
    html += `<div class="sec"><h2>Розетки</h2><div class="grid">${head}
      <div class="card wide">${rows}</div></div></div>`;
  }

  // ── Не на связи ──
  const dead = {};
  states.forEach(s => {
    if (!OFF.includes(s.state)) return;
    const d = s.entity_id.split(".")[0];
    if (["person","tts","conversation","event","update","backup","sun","weather","stt","todo","scene","script","automation"].includes(d)) return;
    if (s.entity_id.startsWith("sensor.backup_")) return;
    let n = s.attributes.friendly_name || s.entity_id;
    n = n.split(" Ток")[0].split(" Мощность")[0].split(" Напряжение")[0]
         .split(" Всего энергия")[0].split(" Поведение")[0].split(" Режим")[0]
         .split(" Блокировка")[0].split(" Socket")[0].split(" Door")[0];
    dead[n] = (dead[n]||0)+1;
  });
  const names = Object.keys(dead).sort();
  if (names.length){
    let r = "";
    names.forEach(n => r += `<div class="row"><span class="l">${esc(n)}</span><span class="r">нет связи</span></div>`);
    html += `<div class="sec"><h2>Не отвечают</h2><div class="card wide">${r}</div></div>`;
  }

  document.getElementById("content").innerHTML = html || `<p class="muted">Нет данных для показа.</p>`;
  const t = new Date();
  document.getElementById("upd").textContent =
    "обновлено в " + t.toLocaleTimeString("ru-RU",{hour:"2-digit",minute:"2-digit"});
}

async function load(){
  try{
    const r = await fetch("/api/home-states", {cache:"no-store"});
    if (!r.ok) throw new Error("HTTP " + r.status);
    render(await r.json());
  }catch(e){
    document.getElementById("content").innerHTML =
      `<div class="err">Не удалось получить состояние дома: ${esc(e.message)}.<br>
       Проверьте, что Home Assistant запущен.</div>`;
    document.getElementById("upd").textContent = "ошибка связи";
  }
}
load();
setInterval(load, 30000);

// ── Графики из истории Home Assistant ──────────────────────────
// Рисуем сами в SVG: тянуть библиотеку графиков ради двух линий
// на слабой машине незачем.

const VOLT_IDS = [
  "sensor.wifi_rozetka_voltage",
  "sensor.maskitol_v_komnate_gleba_voltage",
  "sensor.maskitol_v_komnate_iana_voltage",
  "sensor.moskitol_spalnia_voltage"
];

const POWER_IDS = [
  "sensor.wifi_rozetka_power",
  "sensor.maskitol_v_komnate_gleba_power",
  "sensor.maskitol_v_komnate_iana_power",
  "sensor.moskitol_spalnia_power"
];

// Напряжение меняется постоянно, поэтому график будет всегда.
// Мощность пишется только при изменении: если все розетки выключены,
// точек не будет — это не ошибка, график оживёт при нагрузке.
const CHARTS = [
  {ids:VOLT_IDS,  mode:"avg", t:"Напряжение в сети",   u:" В",  c:"#5b9dd9", dec:0},
  {ids:POWER_IDS, mode:"sum", t:"Потребление розеток", u:" Вт", c:"#4a9d5f", dec:1}
];

function svgLine(points, color){
  if (points.length < 2) return "";
  const W = 600, H = 120, pad = 4;
  const xs = points.map(p => p.t), ys = points.map(p => p.v);
  const x0 = Math.min(...xs), x1 = Math.max(...xs);
  let y0 = Math.min(...ys), y1 = Math.max(...ys);
  if (y1 - y0 < 1e-6){ y0 -= 1; y1 += 1; }
  const sx = t => ((t - x0) / (x1 - x0 || 1)) * W;
  const sy = v => H - pad - ((v - y0) / (y1 - y0)) * (H - pad*2);

  const d = points.map((p,i) => (i ? "L" : "M") + sx(p.t).toFixed(1) + " " + sy(p.v).toFixed(1)).join(" ");
  const area = d + ` L${W} ${H} L0 ${H} Z`;
  const gid = "g" + Math.random().toString(36).slice(2,8);

  const grid = [0, .5, 1].map(f => {
    const y = pad + f * (H - pad*2);
    return `<line class="gl" x1="0" y1="${y.toFixed(1)}" x2="${W}" y2="${y.toFixed(1)}"/>`;
  }).join("");

  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity=".28"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0"/>
    </linearGradient></defs>
    ${grid}
    <path d="${area}" fill="url(#${gid})"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="2"
          stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function series(raw){
  const out = [];
  (raw || []).forEach(p => {
    const v = parseFloat(p.state);
    if (isNaN(v)) return;
    out.push({t: new Date(p.last_changed || p.last_updated).getTime(), v});
  });
  return out.sort((a,b) => a.t - b.t);
}

function combine(all, mode){
  // Складываем мощность розеток: у каждой свои моменты замеров,
  // поэтому идём по общей шкале времени и берём последнее известное
  // значение каждой розетки.
  const marks = [...new Set(all.flat().map(p => p.t))].sort((a,b) => a-b);
  const idx = all.map(() => 0), last = all.map(() => null);
  const out = [];
  marks.forEach(t => {
    let s = 0, n = 0;
    all.forEach((ser,i) => {
      while (idx[i] < ser.length && ser[idx[i]].t <= t) last[i] = ser[idx[i]++].v;
      // пока датчик не отчитался ни разу — не учитываем его,
      // иначе ноль занижает среднее в начале графика
      if (last[i] !== null){ s += last[i]; n++; }
    });
    if (n) out.push({t, v: mode === "avg" ? s / n : s});
  });
  return out;
}

async function history(ids){
  const from = new Date(Date.now() - 24*3600*1000).toISOString().replace(/\.\d+Z$/, "Z");
  const r = await fetch(`/api/home-history/${from}?filter_entity_id=${ids.join(",")}&minimal_response`,
                        {cache:"no-store"});
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}

async function loadCharts(){
  const box = document.getElementById("charts");
  try{
    const ids = [...new Set(CHARTS.flatMap(c => c.ids))];
    const data = await history(ids);
    const map = {};
    data.forEach(arr => { if (arr && arr.length) map[arr[0].entity_id] = series(arr); });

    let html = "";
    CHARTS.forEach(c => {
      const parts = c.ids.map(i => map[i]).filter(x => x && x.length > 1);
      const pts = parts.length ? combine(parts, c.mode) : [];
      const cur = pts.length ? pts[pts.length-1].v.toFixed(c.dec) + c.u : "нет данных";
      html += `<div class="chart"><h3>${esc(c.t)}</h3>
        <div class="sub">сейчас ${esc(cur)} · за сутки</div>
        ${pts.length > 1 ? svgLine(pts, c.c) : `<div class="empty">Пока мало точек для графика</div>`}
      </div>`;
    });
    box.innerHTML = `<div class="sec"><h2>За сутки</h2>${html}</div>`;
  }catch(e){
    box.innerHTML = `<div class="sec"><h2>За сутки</h2>
      <div class="err">Не удалось получить историю: ${esc(e.message)}</div></div>`;
  }
}
loadCharts();
setInterval(loadCharts, 300000);

</script>
</body>
</html>
