# ── HomeGate: dashboards + MCP gate ────────────────────────────
# Самоподписанный сертификат. При переезде и покупке домена:
#   certbot --nginx -d <домен>   (заменит ssl_certificate сам)

server {
    listen 80;
    server_name 192.168.55.120;

    # ACME challenge — оставлен для будущего Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 192.168.55.120;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    access_log /var/log/nginx/homegate.access.log;
    error_log  /var/log/nginx/homegate.error.log warn;

    # ── Дашборды (статика) ──
    root /var/www/dashboards;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # ── MCP-гейт ──
    location /claude-mcp {
        # Список как на skynet и monitoring: подсеть Anthropic, откуда
        # приходят агенты Claude, плюс ноды Тигры. Именно этот список
        # даёт агентам доступ к гейту.
        allow 160.79.106.0/24;  # Anthropic
        allow 85.236.189.73;
        allow 85.236.186.16;
        allow 80.74.24.226;
        allow 127.0.0.1;
        allow 192.168.0.0/16;   # домашняя сеть — для Димы
        deny all;

        proxy_pass http://127.0.0.1:8800;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        chunked_transfer_encoding off;
    }

    # ── Состояния дома для стартовой страницы ──
    # Токен подставляет nginx из /etc/nginx/secrets/ha_auth.conf,
    # в JavaScript его класть нельзя — увидит любой через исходник.
    # Только чтение: GET /api/states, никаких сервисов.
    location = /api/home-states {
        # Только браузер в доме — агентам Claude этот эндпоинт не нужен,
        # у них есть /claude-mcp.
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://127.0.0.1:8123/api/states;
        include /etc/nginx/secrets/ha_auth.conf;
        proxy_set_header Host $host;
        limit_except GET { deny all; }
    }

    # История значений для графиков на стартовой странице.
    # Путь после /api/home-history/ уходит в HA как /api/history/period/...
    location /api/home-history/ {
        allow 127.0.0.1;
        allow 192.168.0.0/16;
        deny all;

        proxy_pass http://127.0.0.1:8123/api/history/period/;
        include /etc/nginx/secrets/ha_auth.conf;
        proxy_set_header Host $host;
        limit_except GET { deny all; }
    }

    # ── Grafana ──
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /grafana/api/live/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # ── Home Assistant ──
    # HA НЕ УМЕЕТ работать в подкаталоге — вынесен на отдельный порт 8443,
    # см. /etc/nginx/conf.d/ha.conf. При появлении домена — сделать ha.<домен>.
    location = /ha {
        return 302 https://$host:8443/;
    }
    location /ha/ {
        return 302 https://$host:8443/;
    }

    # Qdrant наружу НЕ проксируем — только localhost
    location /reports/ {
       alias /var/www/reports/;
       index index.html;
       autoindex off;

       try_files $uri $uri/ /reports/index.html;
    }

}
