services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    user: "65534:65534"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - /opt/monitoring/prometheus:/etc/prometheus:Z
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    depends_on: [prometheus]
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /opt/monitoring/grafana/provisioning:/etc/grafana/provisioning:Z
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_SERVER_ROOT_URL: "https://${SERVER_HOST}/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}


  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    restart: unless-stopped
    user: "0:0"
    ports:
      - "127.0.0.1:3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - /opt/monitoring/loki:/etc/loki:Z
      - loki_data:/loki
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    depends_on: [loki]
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - /opt/monitoring/promtail:/etc/promtail:Z
      - /var/log:/var/log:ro
      - /opt/homegate/logs:/opt/homegate/logs:ro
      - /opt/homeassistant/config:/opt/homeassistant/config:ro
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    ports:
      - "127.0.0.1:9093:9093"
    volumes:
      - /opt/monitoring/alertmanager:/etc/alertmanager:Z
      - alertmanager_data:/alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    logging:
      driver: json-file
      options: {max-size: "10m", max-file: "3"}

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alertmanager_data:
