global:
  resolve_timeout: 5m
  # Телеграм в России недоступен напрямую — ходим через прокси Тигры.
  telegram_api_url: "https://skynet.swipeandev.ru"

route:
  receiver: telegram
  group_by: [alertname]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 6h
  routes:
    # Пожар — без задержек и с повтором каждые полчаса
    - matchers: [severity="critical", alertname="ПОЖАР"]
      receiver: telegram
      group_wait: 0s
      repeat_interval: 30m

receivers:
  - name: telegram
    telegram_configs:
      - bot_token_file: /etc/alertmanager/bot_token
        chat_id: ВАШ_CHAT_ID
        parse_mode: HTML
        message: |
          {{ if eq .Status "firing" }}⚠️{{ else }}✅{{ end }} <b>{{ .CommonAnnotations.summary }}</b>
          {{ range .Alerts }}{{ .Annotations.description }}
          {{ end }}
          <i>{{ .Status }} · дом</i>

inhibit_rules:
  # Если дом целиком не отвечает, не сыпать частными предупреждениями
  - source_matchers: [alertname="ДомНеОтвечает"]
    target_matchers: [severity="warning"]
    equal: [instance]
