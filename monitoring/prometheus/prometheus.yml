global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    host: rockyos

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance: rockyos

  - job_name: homeassistant
    metrics_path: /api/prometheus
    authorization:
      credentials_file: /etc/prometheus/ha_token
    static_configs:
      - targets: ["host.docker.internal:8123"]
        labels:
          instance: rockyos

  - job_name: docker
    static_configs:
      - targets: ["host.docker.internal:9323"]
        labels:
          instance: rockyos
