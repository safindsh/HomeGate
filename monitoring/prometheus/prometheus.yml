global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    host: rockyos

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          instance: rockyos

  # Home Assistant — включим, когда появится (нужен long-lived token)
